<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found (404) — SwapMyCraving</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #e85d04; --primary-dark: #b84800; --bg: #fffbf5; --text: #2b2b2b; --text-soft: #6b6b6b; --border: #f0e6d2; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 16px 0; border-bottom: 1px solid var(--border); background: #fff; }
        .container { max-width: 640px; margin: 0 auto; padding: 0 20px; width: 100%; }
        .logo { font-weight: 700; font-size: 18px; color: var(--text); text-decoration: none; }
        .logo span { color: var(--primary); }
        main { flex: 1; display: flex; align-items: center; }
        .box { text-align: center; padding: 60px 0; width: 100%; }
        .code { font-size: 80px; font-weight: 800; color: var(--primary); line-height: 1; letter-spacing: -0.03em; }
        h1 { font-size: 28px; font-weight: 800; margin: 12px 0 10px; letter-spacing: -0.01em; }
        p { font-size: 17px; color: var(--text-soft); margin-bottom: 28px; }
        .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .links a { display: inline-block; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 15px; transition: border-color .15s, transform .15s; }
        .links a:hover { border-color: var(--primary); transform: translateY(-2px); }
        .links a.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        footer { padding: 24px 0; text-align: center; color: var(--text-soft); font-size: 13px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="container">
        <a href="/" class="logo">Swap<span>My</span>Craving</a>
    </div>
</header>

<main>
    <div class="container">
        <div class="box">
            <div class="code">404</div>
            <h1>This page took a wrong turn</h1>
            <p>The page you're after doesn't exist — but your craving probably still does. Try one of these:</p>
            <div class="links">
                <a href="/" class="primary">Home</a>
                <a href="/healthy-pizza-alternatives/">Healthy Pizza Alternatives</a>
                <a href="/keto-pizza-alternatives/">Keto Pizza Alternatives</a>
            </div>
        </div>
    </div>
</main>

<footer>
    <div class="container">SwapMyCraving — Smart food swaps that actually satisfy.</div>
</footer>

</body>
</html>
